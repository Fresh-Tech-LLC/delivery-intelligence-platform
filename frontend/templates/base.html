<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Delivery Intelligence Platform{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app-shell">

  <nav class="top-nav">
    <span class="brand">📋 Delivery Intelligence Platform</span>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Home</a>
      <a href="/ba/requirements" class="nav-link {% if '/ba/' in request.url.path %}active{% endif %}">BA Mode</a>
      <a href="/requirements" class="nav-link {% if '/requirements' in request.url.path %}active{% endif %}">Requirements Studio</a>
      <a href="/qa" class="nav-link {% if '/qa' in request.url.path %}active{% endif %}">QA Studio</a>
      <a href="/pm" class="nav-link {% if request.url.path == '/pm' %}active{% endif %}">PM Mode</a>
      <a href="/power" class="nav-link {% if '/power' in request.url.path %}active{% endif %}">Power Mode</a>
      <a href="/manage-projects" class="nav-link {% if '/manage-projects' in request.url.path %}active{% endif %}">Manage Projects</a>
    </div>
    <span class="session-badge" title="Your session ID">Session: {{ session_id[:8] if session_id else '—' }}…</span>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
